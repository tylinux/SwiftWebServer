name: SwiftWebServerDemo
options:
  bundleIdPrefix: com.tylinux.SwiftWebServerDemo
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    tvOS: "17.0"
    visionOS: "1.0"
packages:
  SwiftWebServer:
    path: ../
targets:
  SwiftWebServerDemo:
    type: application
    platform: [iOS, macOS, tvOS, visionOS]
    sources:
      - SwiftWebServerDemo
    dependencies:
      - package: SwiftWebServer
        product: SwiftWebServer
      - package: SwiftWebServer
        product: SwiftWebServerWebUpload
    entitlements:
      path: SwiftWebServerDemo/Resources/SwiftWebServerDemo_${platform}.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tylinux.SwiftWebServerDemo.${platform}
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOLS: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
