name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test

  demo:
    name: Build Demo
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Build Demo (macOS)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_macOS \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Demo (iOS)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_iOS \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Demo (tvOS)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_tvOS \
            -destination 'generic/platform=tvOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build Demo (visionOS)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_visionOS \
            -destination 'generic/platform=visionOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
