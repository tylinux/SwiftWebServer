name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Build package
        run: swift build

      - name: Run tests
        run: swift test

  demo:
    name: Build Demo
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Build Demo (macOS)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_macOS \
            -destination 'platform=macOS' \
            build

      - name: Build Demo (iOS Simulator)
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_iOS \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            build

      - name: Build Demo (tvOS Simulator)
        continue-on-error: true
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_tvOS \
            -destination 'platform=tvOS Simulator,name=Apple TV' \
            build

      - name: Build Demo (visionOS Simulator)
        continue-on-error: true
        run: |
          cd Demo
          xcodebuild -project SwiftWebServerDemo.xcodeproj \
            -scheme SwiftWebServerDemo_visionOS \
            -destination 'platform=visionOS Simulator,name=Apple Vision Pro' \
            build
